name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-scan: picks up newly released CodeQL queries even when the
    # code has not changed.
    - cron: '26 7 * * 1'

jobs:
  analyze:
    name: Analyze (java)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload results to the Security tab

    steps:
      - name: Check out sources
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
          # Manual build so the analysis sees the real compilation, including
          # Lombok- and MapStruct-generated code.
          build-mode: manual

      - name: Build (compile only, tests skipped)
        run: ./mvnw -B -ntp -DskipTests package

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
