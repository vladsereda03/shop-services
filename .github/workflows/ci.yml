name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out sources
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Check code formatting
        run: ./mvnw -B -ntp spotless:check

      - name: Build and test
        run: ./mvnw -B -ntp verify

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage
          path: '**/target/site/jacoco/'
          if-no-files-found: error
          retention-days: 14

  images:
    # Build all six service images from the single parameterized Dockerfile,
    # scan them with Trivy, and — only on pushes to main, after the tests have
    # passed — publish them to GHCR as sha-<hash> (immutable) and latest.
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write # push images to GHCR
      security-events: write # upload Trivy results to the Security tab
    strategy:
      # one module's CVE must not cancel the other five scans
      fail-fast: false
      matrix:
        module: [auth, client, product, cart, order, payment]
    steps:
      - name: Check out sources
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.module }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: MODULE=${{ matrix.module }}
          # load into the local daemon so Trivy can scan before anything is pushed
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.module }}
          cache-to: type=gha,scope=${{ matrix.module }},mode=max

      - name: Trivy scan (report)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: image
          image-ref: ghcr.io/${{ github.repository }}/${{ matrix.module }}:${{ steps.meta.outputs.version }}
          format: sarif
          output: trivy-${{ matrix.module }}.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy results
        # Dependabot-triggered runs get a read-only token and cannot upload
        if: github.actor != 'dependabot[bot]'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.module }}.sarif
          category: trivy-${{ matrix.module }}

      - name: Trivy gate (fail on fixable CRITICAL)
        # HIGH and unfixed CRITICALs are reported above but do not break the
        # build: a fresh base-image CVE without a released fix would otherwise
        # turn CI red with no code change to make
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: image
          image-ref: ghcr.io/${{ github.repository }}/${{ matrix.module }}:${{ steps.meta.outputs.version }}
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: MODULE=${{ matrix.module }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # everything is already in the builder's cache — this only pushes
          cache-from: type=gha,scope=${{ matrix.module }}
