name: shop

# Reuse the existing Kafka cluster definition (3 controllers + 3 brokers, KRaft).
# Brokers advertise two listeners: broker-N:19092 inside the compose network,
# localhost:29092/39092/49092 for processes on the host.
include:
  - infra/docker/kafka/docker-compose.yaml

# shared fragments
x-db-credentials: &db-credentials
  SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-shop}
  SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-shop}

services:
  auth:
    build:
      context: .
      args: { MODULE: auth }
    image: shop/auth
    container_name: shop-auth
    environment:
      <<: *db-credentials
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/authDB
      SPRING_KAFKA_BOOTSTRAP_SERVERS: broker-1:19092,broker-2:19092,broker-3:19092
      # RSA pair for JWT signing, single-line Base64 DER (see .env.example)
      JWK_KEY_ID: ${JWK_KEY_ID:?see .env.example}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:?see .env.example}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:?see .env.example}
      # ship spans to the zipkin container (the yaml default is localhost:9411, host mode)
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
    ports:
      # the browser talks to auth directly (login form, OIDC redirects):
      # auth.local must resolve to 127.0.0.1 on the host (hosts file)
      - "9000:9000"
    networks:
      default:
        # containers resolve the OIDC issuer http://auth.local:9000 to this container
        aliases: [auth.local]
      kafka-net: {}
    depends_on:
      postgres: { condition: service_healthy }
      broker-1: { condition: service_started }
      broker-2: { condition: service_started }
      broker-3: { condition: service_started }
    healthcheck:
      # HTTP GET via bash /dev/tcp — the JRE image has no curl/wget
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/9000 && printf 'GET /actuator/health HTTP/1.0\\r\\n\\r\\n' >&3 && grep -q '\"status\":\"UP\"' <&3"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  client:
    build:
      context: .
      args: { MODULE: client }
    image: shop/client
    container_name: shop-client
    environment:
      # these two are localhost in application.yaml (host mode) — point them at containers
      SERVICES_ORDER_BASE_URL: http://order:8084
      SERVICES_PAYMENT_BASE_URL: http://payment:8085
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
    ports:
      - "8080:8080"
    depends_on:
      # client resolves the OIDC configuration from auth at startup
      auth: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080 && printf 'GET /actuator/health HTTP/1.0\\r\\n\\r\\n' >&3 && grep -q '\"status\":\"UP\"' <&3"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  product:
    build:
      context: .
      args: { MODULE: product }
    image: shop/product
    container_name: shop-product
    environment:
      <<: *db-credentials
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/products
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
    networks:
      default:
        aliases: [product.local]
    depends_on:
      postgres: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8082 && printf 'GET /actuator/health HTTP/1.0\\r\\n\\r\\n' >&3 && grep -q '\"status\":\"UP\"' <&3"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  cart:
    build:
      context: .
      args: { MODULE: cart }
    image: shop/cart
    container_name: shop-cart
    environment:
      <<: *db-credentials
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/carts
      SPRING_KAFKA_BOOTSTRAP_SERVERS: broker-1:19092,broker-2:19092,broker-3:19092
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
    networks:
      default:
        aliases: [cart.local]
      kafka-net: {}
    depends_on:
      postgres: { condition: service_healthy }
      broker-1: { condition: service_started }
      broker-2: { condition: service_started }
      broker-3: { condition: service_started }
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8083 && printf 'GET /actuator/health HTTP/1.0\\r\\n\\r\\n' >&3 && grep -q '\"status\":\"UP\"' <&3"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  order:
    build:
      context: .
      args: { MODULE: order }
    image: shop/order
    container_name: shop-order
    environment:
      <<: *db-credentials
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/orders
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      postgres: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8084 && printf 'GET /actuator/health HTTP/1.0\\r\\n\\r\\n' >&3 && grep -q '\"status\":\"UP\"' <&3"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  payment:
    build:
      context: .
      args: { MODULE: payment }
    image: shop/payment
    container_name: shop-payment
    environment:
      <<: *db-credentials
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payments
      # localhost in application.yaml (host mode) — point it at the order container
      SERVICES_ORDER_BASE_URL: http://order:8084
      # keep the signing key in sync with scripts/emulate-liqpay-callback.ps1 on the host
      LIQPAY_PUBLIC_KEY: ${LIQPAY_PUBLIC_KEY:-sandbox_public_key}
      LIQPAY_PRIVATE_KEY: ${LIQPAY_PRIVATE_KEY:-sandbox_private_key}
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
    ports:
      # the LiqPay callback emulator script posts from the host
      - "8085:8085"
    depends_on:
      postgres: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8085 && printf 'GET /actuator/health HTTP/1.0\\r\\n\\r\\n' >&3 && grep -q '\"status\":\"UP\"' <&3"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s
  postgres:
    image: postgres:16-alpine
    container_name: shop-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shop}
    ports:
      # 5433 on the host to avoid clashing with a locally installed PostgreSQL
      - "5433:5432"
    volumes:
      - ./infra/docker/postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
      - shop_pg16_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --- observability ---

  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: shop-prometheus
    volumes:
      - ./infra/docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # keep collected metrics across restarts
      - shop_prometheus_data:/prometheus
    ports:
      - "9090:9090"

  zipkin:
    image: openzipkin/zipkin:3.6.1
    container_name: shop-zipkin
    # spans live in memory (default STORAGE_TYPE=mem) — enough for a demo,
    # traces are lost on container restart; services degrade gracefully if it is down
    ports:
      - "9411:9411"

  grafana:
    image: grafana/grafana:12.1.0
    container_name: shop-grafana
    environment:
      # demo credentials; override via .env if the stack is ever exposed
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./infra/docker/grafana/provisioning:/etc/grafana/provisioning:ro
      # keep manually created dashboards across restarts
      - shop_grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  shop_pg16_data:
  shop_prometheus_data:
  shop_grafana_data:
