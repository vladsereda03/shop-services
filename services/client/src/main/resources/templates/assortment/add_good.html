<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Додати товар')}"></head>
<body>

<th:block th:replace="~{fragments/layout :: header}"/>

<main class="page page-narrow">
    <h1 class="page-title">Додати товар</h1>

    <div class="banner banner-error" th:if="${addGoodError}" th:text="${addGoodError}"></div>

    <form class="card" th:action="@{/goods/add}" method="post" enctype="multipart/form-data"
          th:object="${good}">

        <label class="form-label">Назва:</label>
        <input class="form-control" type="text" th:field="*{name}" required>

        <label class="form-label">Ціна (коп.):</label>
        <input class="form-control" type="number" th:field="*{priceKopeck}" min="0" required>

        <label class="form-label">Опис:</label>
        <textarea class="form-control" th:field="*{description}" rows="3"></textarea>

        <label class="form-label">Категорія:</label>
        <input class="form-control" type="text" th:field="*{category}">

        <label class="form-label">Кількість:</label>
        <input class="form-control" type="number" th:field="*{quantity}" min="0" required>

        <label class="form-label">Виробники:</label>
        <select class="form-control" th:field="*{manufacturerIds}" multiple>
            <option th:each="m : ${manufacturers}"
                    th:value="${m.id}"
                    th:text="${m.name}"></option>
        </select>

        <div class="file-upload">
            <label for="imageFile" class="btn btn-secondary btn-sm">Обрати фото</label>
            <input id="imageFile" type="file" name="imageFile" accept="image/*">
            <span id="fileName" class="file-name">Файл не вибрано</span>
        </div>

        <div class="actions">
            <button type="submit" class="btn btn-primary btn-block">Додати</button>
        </div>
    </form>

    <a class="back-link" th:href="@{/}">Повернутися до каталогу</a>
</main>

<script>
    const input = document.getElementById('imageFile');
    const fileName = document.getElementById('fileName');

    input.addEventListener('change', () => {
        fileName.textContent = input.files.length > 0
            ? input.files[0].name
            : 'Файл не вибрано';
    });
</script>

</body>
</html>
