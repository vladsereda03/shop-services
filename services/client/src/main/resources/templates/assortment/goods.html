<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Каталог')}"></head>
<body>

<th:block th:replace="~{fragments/layout :: header}"/>

<main class="page">
    <h1 class="page-title">Каталог</h1>

    <div class="goods-grid">
        <a class="good-card" th:each="good : ${goods}" th:href="@{/goods/{id}(id=${good.getId()})}">
            <img th:src="|data:image/jpg;base64,${good.imageBase64}|" alt="Фото товару">
            <div class="good-card-body">
                <div class="good-card-title" th:text="${good.getName()}"></div>
                <div class="price" th:text="|${good.getPriceGrn()} грн|"></div>
            </div>
        </a>
    </div>

    <p class="empty-state" th:if="${#lists.isEmpty(goods)}">Каталог порожній</p>
</main>

</body>
</html>
