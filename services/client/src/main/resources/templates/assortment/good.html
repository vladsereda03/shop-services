<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Товар')}"></head>
<body>

<th:block th:replace="~{fragments/layout :: header}"/>

<main class="page">
    <div class="banner banner-error" th:if="${cartError}" th:text="${cartError}"></div>

    <div class="card good-detail">
        <img class="good-detail-photo" th:src="|data:image/jpg;base64,${good.imageBase64}|" alt="Фото товару">

        <div>
            <h1 th:text="${good.getName()}"></h1>
            <div class="price" th:text="|${good.getPriceGrn()} грн|"></div>

            <p class="meta-row">
                <span class="meta-label">Категорія:</span>
                <span th:text="${category}"></span>
            </p>
            <p class="meta-row">
                <span class="meta-label">Доступність:</span>
                <span th:text="${isAvailable}"
                      th:classappend="${good.getQuantity() > 0} ? 'availability-in' : 'availability-out'"></span>
            </p>
            <p class="meta-row"><span class="meta-label">Виробники:</span></p>
            <div class="chips">
                <span class="chip" th:each="manufacturer : ${good.getManufacturers()}"
                      th:text="${manufacturer.getName()}"></span>
            </div>
            <p class="meta-row" th:if="${good.getDescription()}">
                <span class="meta-label">Опис:</span>
                <span th:text="${good.getDescription()}"></span>
            </p>

            <div class="actions">
                <div class="stepper">
                    <button type="button" onclick="decrementQuantity()">−</button>
                    <div class="quantity-display">1</div>
                    <button type="button" onclick="incrementQuantity()">+</button>
                </div>
                <button class="btn btn-primary" onclick="submitQuantity()">В кошик</button>
            </div>
        </div>
    </div>
</main>

<script th:inline="javascript">
    let quantityDisplay = document.querySelector('.quantity-display');
    let quantity = 1;

    function incrementQuantity() {
        quantity++;
        quantityDisplay.textContent = quantity;
    }

    function decrementQuantity() {
        if (quantity > 1) {
            quantity--;
            quantityDisplay.textContent = quantity;
        }
    }

    function submitQuantity() {
        const goodId = /*[[${good.id}]]*/ 0;
        window.location.href = '/cart/add?goodId=' + goodId + '&quantity=' + quantity;
    }
</script>

</body>
</html>
