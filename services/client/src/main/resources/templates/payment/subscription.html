<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Оформлення платіжної підписки')}"></head>
<body>

<th:block th:replace="~{fragments/layout :: header}"/>

<main class="page page-narrow">
    <h1 class="page-title">Оформлення платіжної підписки</h1>

    <div class="banner banner-success"
         th:text="|Сума до сплати: ${subscriptionPrice} ${subscriptionCurrency}|">Сума до сплати</div>

    <form class="card" th:action="@{/subscription}" th:object="${subscriptionForm}" method="post">

        <label class="form-label" for="phone">Номер телефону (+380...)</label>
        <input class="form-control" type="tel" id="phone" th:field="*{phone}"
               placeholder="+380XXXXXXXXX" pattern="^\+380\d{9}$" required>

        <label class="form-label" for="time">Час першого платежу</label>
        <input class="form-control" type="time" id="time" th:field="*{startTime}" required>

        <label class="form-label" for="date">День першого платежу</label>
        <input class="form-control" type="date" id="date" th:field="*{startDate}" required>

        <label class="form-label" for="periodicity">Періодичність замовлення</label>
        <select class="form-control" id="periodicity" th:field="*{periodicity}" required>
            <option value="day">Щодня</option>
            <option value="week">Щотижня</option>
            <option value="month">Щомісяця</option>
            <option value="year">Щороку</option>
        </select>

        <label class="form-label" for="cardNumber">Номер картки</label>
        <input class="form-control" type="text" id="cardNumber" th:field="*{cardNumber}"
               maxlength="16" pattern="\d{16}" placeholder="XXXX XXXX XXXX XXXX" required>

        <div class="form-row">
            <div>
                <label class="form-label" for="expMonth">Місяць дії картки</label>
                <input class="form-control" type="number" id="expMonth" th:field="*{expMonth}"
                       min="1" max="12" placeholder="MM" required>
            </div>
            <div>
                <label class="form-label" for="expYear">Рік дії картки</label>
                <input class="form-control" type="number" id="expYear" th:field="*{expYear}"
                       min="24" max="99" placeholder="YY" required>
            </div>
            <div>
                <label class="form-label" for="cvv">CVV</label>
                <input class="form-control" type="password" id="cvv" th:field="*{cvv}"
                       maxlength="3" pattern="\d{3}" required>
            </div>
        </div>

        <div class="actions">
            <button type="submit" class="btn btn-primary btn-block">Підтвердити підписку</button>
        </div>
    </form>

    <a class="back-link" th:href="@{/cart}">Повернутися до кошика</a>
</main>

</body>
</html>
