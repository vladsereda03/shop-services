<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Замовлення')}"></head>
<body>

<th:block th:replace="~{fragments/layout :: header}"/>

<main class="page page-narrow">
    <h1 class="page-title">Ваші замовлення</h1>

    <p class="empty-state" th:if="${#lists.isEmpty(orders)}">У вас ще немає замовлень</p>

    <div class="card order-card" th:each="order : ${orders}">
        <div class="order-header">
            <h2 th:text="'Замовлення №' + ${order.id}">Замовлення №</h2>
            <span class="order-date" th:text="${order.createdAt}">час оформлення</span>
        </div>

        <div class="cart-line" th:each="item : ${order.items}">
            <span class="cart-line-name" th:text="${item.name}"></span>
            <span class="cart-line-qty" th:text="|${item.quantity} од.|"></span>
        </div>

        <div class="cart-total">
            <span>Разом</span>
            <span class="price" th:text="|${order.totalGrn} грн|"></span>
        </div>
    </div>

    <a class="back-link" th:href="@{/}">До каталогу</a>
</main>

</body>
</html>
