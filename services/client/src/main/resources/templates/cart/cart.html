<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Кошик')}"></head>
<body>

<th:block th:replace="~{fragments/layout :: header}"/>

<main class="page page-narrow">
    <h1 class="page-title">Кошик</h1>

    <div class="banner banner-error" th:if="${orderError}" th:text="${orderError}"></div>
    <div class="banner banner-success" th:if="${subscriptionSuccess}" th:text="${subscriptionSuccess}"></div>

    <div class="card">
        <div class="cart-line" th:each="item : ${items}">
            <span class="cart-line-name" th:text="${item.name}"></span>
            <span class="cart-line-qty" th:text="|${item.quantity} од.|"></span>
            <span class="price" th:text="|${item.totalGrn} грн|"></span>
        </div>

        <p class="empty-state" th:if="${#lists.isEmpty(items)}">Кошик порожній</p>

        <div class="cart-total" th:unless="${#lists.isEmpty(items)}">
            <span>Разом</span>
            <span class="price" th:text="|${price} грн|"></span>
        </div>
    </div>

    <div class="actions">
        <a class="btn btn-secondary" th:href="@{/cart/clear}">Очистити кошик</a>
        <a class="btn btn-primary" th:href="@{/orders/checkout}">Оформити замовлення</a>
        <a class="btn btn-secondary" th:href="@{/subscription/new}">Регулярна підписка</a>
        <!-- платіжна форма LiqPay (HTML генерує payment-сервіс) -->
        <div class="liqpay-form" th:if="${liqpayForm}" th:utext="${liqpayForm}"></div>
    </div>
</main>

</body>
</html>
