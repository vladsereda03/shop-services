server:
  servlet:
    session:
      persistent: false
  port: 8080

services:
  auth:
    base-url: http://auth.local:9000
  product:
    base-url: http://product.local:8082
  cart:
    base-url: http://cart.local:8083
  order:
    base-url: http://localhost:8084
  payment:
    base-url: http://localhost:8085

spring:
  application:
    # short lowercase name: it becomes the service name in Zipkin traces
    name: client
  http:
    client:
      # a hung neighbour must become an error, not an eternal wait — without
      # timeouts the circuit breaker never sees the failure (applies to the
      # auto-configured factory behind the injected RestClient.Builder)
      connect-timeout: 2s
      read-timeout: 5s
  security:
    oauth2:
      client:
        registration:
          client:
            client-id: client
            client-name: client
            client-secret: secret
            client-authentication-method: client_secret_basic
            provider: auth-service
            authorization-grant-type: authorization_code
            redirect-uri: "http://localhost:8080/login/oauth2/code/client"
            scope: openid,profile,products.read
        provider:
          auth-service:
            issuer-uri: http://auth.local:9000
            authorization-uri: http://auth.local:9000/oauth2/authorize
            token-uri: http://auth.local:9000/oauth2/token
            user-info-uri: http://auth.local:9000/userinfo
            user-name-attribute: sub
  devtools:
    restart:
      enabled: false


logging:
  level:
    org.hibernate.SQL: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web.reactive.function.client: TRACE

management:
  endpoints:
    web:
      exposure:
        # only what we consume: health for container probes, prometheus for scraping
        include: health, prometheus
  endpoint:
    health:
      probes:
        # adds /actuator/health/liveness and /actuator/health/readiness
        enabled: true
  tracing:
    sampling:
      # export every trace — demo setting; production typically samples 1-10%
      probability: 1.0
