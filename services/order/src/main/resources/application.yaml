server:
  port: 8084

services:
  cart:
    base-url: http://cart.local:8083

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/orders
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    # dev DBs already contain the schema: mark them with a baseline instead of running V1
    baseline-on-migrate: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://auth.local:9000
          jwk-set-uri: http://auth.local:9000/oauth2/jwks
      client:
        registration:
          cart-api:
            provider: auth-server
            client-id: order-service
            client-secret: order-service-secret
            authorization-grant-type: client_credentials
            scope: carts.read,carts.write
        provider:
          auth-server:
            token-uri: http://auth.local:9000/oauth2/token
