server:
  port: 8084

services:
  cart:
    base-url: http://cart.local:8083

spring:
  application:
    # short lowercase name: it becomes the service name in Zipkin traces
    name: order
  http:
    client:
      # a hung neighbour must become an error, not an eternal wait — without
      # timeouts the circuit breaker never sees the failure (applies to the
      # auto-configured factory behind the injected RestClient.Builder)
      connect-timeout: 2s
      read-timeout: 5s
  mvc:
    problemdetails:
      # RFC 7807 application/problem+json bodies for MVC-handled errors
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5432/orders
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    # dev DBs already contain the schema: mark them with a baseline instead of running V1
    baseline-on-migrate: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://auth.local:9000
          jwk-set-uri: http://auth.local:9000/oauth2/jwks
      client:
        registration:
          cart-api:
            provider: auth-server
            client-id: order-service
            client-secret: ${ORDER_SERVICE_SECRET:order-service-secret}
            authorization-grant-type: client_credentials
            scope: carts.read,carts.write
        provider:
          auth-server:
            token-uri: http://auth.local:9000/oauth2/token

management:
  endpoints:
    web:
      exposure:
        # only what we consume: health for container probes, prometheus for scraping
        include: health, prometheus
  endpoint:
    health:
      probes:
        # adds /actuator/health/liveness and /actuator/health/readiness
        enabled: true
  tracing:
    sampling:
      # export every trace — demo setting; production typically samples 1-10%
      probability: 1.0

resilience4j:
  circuitbreaker:
    configs:
      # applies to every breaker in this service (the cart leg);
      # the parameters are explained in cart-service's application.yaml
      default:
        sliding-window-type: count_based
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        ignore-exceptions:
          - org.springframework.web.client.HttpClientErrorException
  retry:
    configs:
      # only read-only calls carry @Retry
      default:
        max-attempts: 3
        wait-duration: 200ms
        retry-exceptions:
          - org.springframework.web.client.HttpServerErrorException
          - org.springframework.web.client.ResourceAccessException

---
# dev profile: verbose SQL logging for local runs (SPRING_PROFILES_ACTIVE=dev)
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true
