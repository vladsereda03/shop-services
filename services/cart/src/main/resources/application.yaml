server:
  port: 8083

services:
  product:
    base-url: http://product.local:8082

spring:
  application:
    # short lowercase name: it becomes the service name in Zipkin traces
    name: cart
  http:
    client:
      # a hung neighbour must become an error, not an eternal wait — without
      # timeouts the circuit breaker never sees the failure (applies to the
      # auto-configured factory behind the injected RestClient.Builder)
      connect-timeout: 2s
      read-timeout: 5s
  mvc:
    problemdetails:
      # RFC 7807 application/problem+json bodies for MVC-handled errors
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5432/carts
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    # dev DBs already contain the schema: mark them with a baseline instead of running V1
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: localhost:29092, localhost:39092, localhost:49092
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      group-id: cart-service
      properties:
        spring.json.trusted.packages: shop.event
      auto-offset-reset: earliest
    listener:
      # continue the trace carried in record headers instead of starting a new one
      observation-enabled: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://auth.local:9000
          jwk-set-uri: http://auth.local:9000/oauth2/jwks
      client:
        registration:
          product-api:
            provider: auth-server
            client-id: cart-service
            client-secret: cart-service-secret
            authorization-grant-type: client_credentials
            scope: products.read,products.write
        provider:
          auth-server:
            token-uri: http://auth.local:9000/oauth2/token

management:
  endpoints:
    web:
      exposure:
        # only what we consume: health for container probes, prometheus for scraping
        include: health, prometheus
  endpoint:
    health:
      probes:
        # adds /actuator/health/liveness and /actuator/health/readiness
        enabled: true
  tracing:
    sampling:
      # export every trace — demo setting; production typically samples 1-10%
      probability: 1.0

resilience4j:
  circuitbreaker:
    instances:
      product:
        # decide over the last 10 calls, but not before 5 have been recorded
        sliding-window-type: count_based
        sliding-window-size: 10
        minimum-number-of-calls: 5
        # open when at least half of the window failed
        failure-rate-threshold: 50
        # reject calls for 10s, then allow 3 probes (half-open) to decide
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        # 4xx are business answers (404, 409 insufficient stock) — must not trip the breaker
        ignore-exceptions:
          - org.springframework.web.client.HttpClientErrorException
  retry:
    instances:
      product:
        max-attempts: 3
        wait-duration: 200ms
        # only transient faults are worth retrying
        retry-exceptions:
          - org.springframework.web.client.HttpServerErrorException
          - org.springframework.web.client.ResourceAccessException
