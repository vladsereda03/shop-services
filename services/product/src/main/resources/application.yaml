server:
  port: 8082

spring:
  application:
    # short lowercase name: it becomes the service name in Zipkin traces
    name: product
  mvc:
    problemdetails:
      # RFC 7807 application/problem+json bodies for MVC-handled errors
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5432/products
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    # dev DBs already contain the schema: mark them with a baseline instead of running V1
    baseline-on-migrate: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://auth.local:9000
          jwk-set-uri: http://auth.local:9000/oauth2/jwks

management:
  endpoints:
    web:
      exposure:
        # only what we consume: health for container probes, prometheus for scraping
        include: health, prometheus
  endpoint:
    health:
      probes:
        # adds /actuator/health/liveness and /actuator/health/readiness
        enabled: true
  tracing:
    sampling:
      # export every trace — demo setting; production typically samples 1-10%
      probability: 1.0