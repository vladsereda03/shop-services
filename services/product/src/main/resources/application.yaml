server:
  port: 8082

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/products
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://auth.local:9000
          jwk-set-uri: http://auth.local:9000/oauth2/jwks