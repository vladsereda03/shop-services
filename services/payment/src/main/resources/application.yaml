server:
  port: 8085

liqpay:
  public-key: ${LIQPAY_PUBLIC_KEY:sandbox_public_key}
  private-key: ${LIQPAY_PRIVATE_KEY:sandbox_private_key}

payment:
  # in a real deployment LiqPay must be able to reach these URLs from the internet
  result-url: http://localhost:8080/orders
  server-url: http://localhost:8085/payment/new
  subscription:
    # LiqPay sandbox does not support subscriptions, so by default the recurring
    # charges are fully emulated by the local scheduler; enable with real keys in production
    register-in-liqpay: ${LIQPAY_SUBSCRIBE_ENABLED:false}

# local emulator of LiqPay recurring-charge callbacks (LiqPay cannot reach localhost)
task:
  cron:
    day: 0 0 15 * * *      # daily 15:00
    week: 0 0 15 * * MON   # weekly (Monday) 15:00
    month: 0 0 15 1 * *    # monthly (1st day) 15:00
    year: 0 0 15 1 1 *     # yearly (Jan 1st) 15:00

services:
  order:
    base-url: http://localhost:8084
  cart:
    base-url: http://cart.local:8083

spring:
  application:
    # short lowercase name: it becomes the service name in Zipkin traces
    name: payment
  http:
    client:
      # a hung neighbour must become an error, not an eternal wait — without
      # timeouts the circuit breaker never sees the failure (applies to the
      # auto-configured factory behind the injected RestClient.Builder)
      connect-timeout: 2s
      read-timeout: 5s
  mvc:
    problemdetails:
      # RFC 7807 application/problem+json bodies for MVC-handled errors
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5432/payments
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    # dev DBs already contain the schema: mark them with a baseline instead of running V1
    baseline-on-migrate: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://auth.local:9000
          jwk-set-uri: http://auth.local:9000/oauth2/jwks
      client:
        registration:
          # one registration for all service-to-service calls (order + cart)
          shop-api:
            provider: auth-server
            client-id: payment-service
            client-secret: payment-service-secret
            authorization-grant-type: client_credentials
            scope: orders.write,carts.read,carts.write
        provider:
          auth-server:
            token-uri: http://auth.local:9000/oauth2/token

management:
  endpoints:
    web:
      exposure:
        # only what we consume: health for container probes, prometheus for scraping
        include: health, prometheus
  endpoint:
    health:
      probes:
        # adds /actuator/health/liveness and /actuator/health/readiness
        enabled: true
  tracing:
    sampling:
      # export every trace — demo setting; production typically samples 1-10%
      probability: 1.0

resilience4j:
  circuitbreaker:
    configs:
      # applies to every breaker in this service (order and cart legs);
      # the parameters are explained in cart-service's application.yaml
      default:
        sliding-window-type: count_based
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        ignore-exceptions:
          - org.springframework.web.client.HttpClientErrorException
  retry:
    configs:
      # only read-only calls carry @Retry (the cart fetch)
      default:
        max-attempts: 3
        wait-duration: 200ms
        retry-exceptions:
          - org.springframework.web.client.HttpServerErrorException
          - org.springframework.web.client.ResourceAccessException
