<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<div class="auth-page">
    <div class="auth-card">
        <span class="auth-brand">Shop<span class="brand-dot">.</span></span>
        <h1>Вхід до акаунта</h1>

        <div class="banner banner-error" th:if="${authenticationWarning}"
             th:text="${authenticationWarning}"></div>

        <form method="POST" action="/account/login">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <label class="form-label" for="username">Логін</label>
            <input class="form-control" type="text" id="username" name="username" required/>

            <label class="form-label" for="password">Пароль</label>
            <input class="form-control" type="password" id="password" name="password" required/>

            <button type="submit" class="btn btn-primary btn-block">Увійти</button>
        </form>

        <p class="auth-alt">Вперше у нас? <a href="/account/signup/form">Зареєструватися</a></p>
    </div>
</div>
</body>
</html>
