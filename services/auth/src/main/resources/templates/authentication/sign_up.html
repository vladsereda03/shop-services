<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Реєстрація</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<div class="auth-page">
    <div class="auth-card">
        <span class="auth-brand">Shop<span class="brand-dot">.</span></span>
        <h1>Реєстрація</h1>

        <div th:if="${registrationError}" class="banner banner-error" th:text="${registrationError}"></div>

        <form th:method="post" th:action="@{/account/signup}" th:object="${userDTO}" id="signupForm">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <label class="form-label" for="username">Логін</label>
            <input class="form-control" type="text" id="username" th:field="*{username}" name="username" required/>

            <label class="form-label" for="password">Пароль</label>
            <input class="form-control" type="password" id="password" th:field="*{password}" name="password" required/>

            <label class="form-label" for="email">Email</label>
            <input class="form-control" type="email" id="email" th:field="*{email}" name="email" required/>

            <label class="form-label" for="fullName">Повне ім'я</label>
            <input class="form-control" type="text" id="fullName" th:field="*{fullName}" name="fullName" required/>

            <label class="form-label" for="phone">Телефон (+380...)</label>
            <input class="form-control" type="text" id="phone" th:field="*{phone}" name="phone" required/>

            <button type="submit" class="btn btn-primary btn-block">Зареєструватися</button>
        </form>

        <p class="auth-alt">Вже маєте акаунт? <a href="/account/login/form">Увійти</a></p>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const form = document.getElementById("signupForm");
        form.addEventListener("submit", function(event) {
            const username = form.querySelector("input[name='username']").value.trim();
            const password = form.querySelector("input[name='password']").value;
            const email = form.querySelector("input[name='email']").value.trim();
            const fullName = form.querySelector("input[name='fullName']").value.trim();
            const phone = form.querySelector("input[name='phone']").value.trim();

            let errors = [];

            // Username: минимум 8 символов, начинается с буквы, буквы/цифры/_
            if (!/^[a-zA-Z][a-zA-Z0-9_]{7,}$/.test(username)) {
                errors.push("Username має починатися з літери, містити лише букви, цифри або підкреслення, мінімум 8 символів.");
            }

            // Password минимум 8 символов
            if (password.length < 8) {
                errors.push("Пароль має містити мінімум 8 символів.");
            }

            // Email валидный

            if (!/^[\w.-]+@([\w-]+\.)+[a-z]{2,}$/.test(email)) {
                errors.push("Невірний формат email.");
            }

            // Full name не пустое (для простоты)
            if (fullName.length === 0) {
                errors.push("Повне ім'я не може бути порожнім.");
            }

            // Phone +380 и 9 цифр
            if (!/^\+380\d{9}$/.test(phone)) {
                errors.push("Телефон має починатися з +380 і містити 9 цифр.");
            }

            if (errors.length > 0) {
                event.preventDefault();
                alert(errors.join("\\n"));
            }
        });
    });
</script>
</body>
</html>
